    <style>

        .chat-header {

        @keyframes fadeIn {

        .avatar {

        .message {
            padding: 14px 18px;

        .bot-message {
            background: white;

        .chat-input input:focus {
            border-color: #667eea;

        .send-btn, .mic-btn {
            border: none;

        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);

        .send-btn:hover {
            transform: scale(1.05);

        .mic-btn {
            background: white;

            border: 1px solid #e0e0e0;

        }
        .mic-btn:hover {
            background: #f8f9fa;

        .mic-btn.listening {
            background: #667eea;

        }
        .mic-btn.voice-active::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #667eea;

        }
        .mic-btn.voice-active::after {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            right: -12px;
            bottom: -12px;
            border-radius: 50%;
            border: 2px solid rgba(102, 126, 234, 0.3);
            animation: voiceRing 1.5s linear infinite reverse;
        }
        @keyframes voiceRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .voice-hint {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #667eea;
            color: white;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.8rem;
            display: none;
            pointer-events: none;
        }
        .voice-hint.active { display: block; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }
        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .left-panel { width: 100%; height: 40%; min-height: 250px; }
            .right-panel { width: 100%; height: 60%; }
            .left-content h1 { font-size: 2rem; }
            .left-content p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="left-content">
                <h1>BotifyAI</h1>
                <p>AI Chatbots for UAE Businesses — Arabic & English, 24/7, Live in 5 Minutes.</p>
            </div>
        </div>

        <div class="right-panel">
            <div class="chat-header">
                <div style="display:flex;align-items:center;gap:10px"><img src="https://i.imgur.com/FfNwGyA.png" width="32" height="32" style="border-radius:50%;object-fit:cover"/><h3>BotifyAI Assistant</h3></div>
            </div>
            <div class="chat-messages" id="messages">
                <div class="message-row bot-row" id="welcomeRow">
                    <div class="avatar bot-avatar" style="background:none;padding:0"><img src="https://i.imgur.com/FfNwGyA.png" width="34" height="34" style="border-radius:50%;object-fit:cover"/></div>
                    <div class="message bot-message" id="welcomeMsg">
                        <span class="bot-text">Hello! I am your AI assistant. I know about many topics — ask me anything! 😊</span>
                        <div class="msg-actions">
                            <button onclick="copyMessage(this)" title="Copy">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                Copy
                            </button>
                            <button onclick="shareMessage(this)" title="Share">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                                Share
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="typing" class="typing" style="display:none">AI is typing...</div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Type your message..."
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                onkeydown="if(event.key==='Enter'){ event.preventDefault(); sendMessage(); }"/>
                <button type="button" class="mic-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()" aria-label="Upload document" title="Upload document">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                </button>
                <input type="file" id="fileInput" style="display:none" accept=".pdf,.docx,.doc,.txt,.md,.csv,.json" onchange="uploadDocument(this)">
                <button type="button" class="mic-btn" id="micBtn" onclick="toggleVoiceInput()" aria-label="Voice input">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <div class="voice-hint" id="voiceHint">Listening...</div>
                <button type="button" class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const recognitionLangs = {
            en: 'en-US', hi: 'hi-IN', ur: 'ur-PK', bn: 'bn-IN', pa: 'pa-IN',
            ta: 'ta-IN', te: 'te-IN', ml: 'ml-IN', kn: 'kn-IN', mr: 'mr-IN',
            gu: 'gu-IN', or: 'or-IN', as: 'as-IN', ar: 'ar-SA', es: 'es-ES',
            fr: 'fr-FR', de: 'de-DE', zh: 'zh-CN', ja: 'ja-JP', ko: 'ko-KR',
            ru: 'ru-RU', pt: 'pt-BR', it: 'it-IT', tr: 'tr-TR'
        };

        const playIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`;
        const pauseIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
        const copyIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        const shareIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>`;

        const messageActionsHTML = `
            <div class="msg-actions">
                <button onclick="copyMessage(this)" title="Copy">${copyIcon} Copy</button>
                <button onclick="shareMessage(this)" title="Share">${shareIcon} Share</button>
            </div>
        `;

        function getMessageText(btn) {
            const msg = btn.closest('.message');
            if (!msg) return '';
            const clone = msg.cloneNode(true);
            const actions = clone.querySelector('.msg-actions');
            const player = clone.querySelector('.voice-player');
            if (actions) actions.remove();
            if (player) player.remove();
            const botText = clone.querySelector('.bot-text');
            if (botText) return botText.textContent.trim();
            return clone.textContent.trim();
        }

        function stripEmojis(text) {
            return text.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{1F600}-\u{1F64F}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]|[\u{1F900}-\u{1F9FF}]|[\u{2B00}-\u{2BFF}]/gu, '').trim();
        }

        function copyMessage(btn) {
            const text = getMessageText(btn);
            if (!text) return;
            const original = btn.innerHTML;
            const showCopied = () => {
                btn.innerHTML = `${copyIcon} Copied!`;
                setTimeout(() => btn.innerHTML = original, 1500);
            };
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(showCopied).catch(showCopied);
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showCopied();
            }
        }

        function shareMessage(btn) {
            const text = getMessageText(btn);
            if (!text) return;
            if (navigator.share) {
                navigator.share({ title: 'AI Chatbot', text: text }).catch(() => {});
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => alert('Message copied to share'));
            } else {
                alert('Sharing not supported on this browser');
            }
        }

        let recognition = null;
        let isListening = false;
        let voiceMode = false;
        let lastDetectedLang = recognitionLangs[(navigator.language || 'en-US').split('-')[0]] || (navigator.language || 'en-US');
        let voiceSendTimer = null;
        let currentAudio = null;
        let currentAudioMsg = null;
        let conversationHistory = [];

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Voice input not supported in this browser. Try Chrome.');
                return null;
            }
            const rec = new SpeechRecognition();
            rec.continuous = true;
            rec.interimResults = true;
            rec.onresult = function(event) {
                let finalText = '';
                let interimText = '';
                for (let i = 0; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalText += transcript + ' ';
                    } else {
                        interimText += transcript;
                    }
                }
                document.getElementById('userInput').value = (finalText + interimText).trim();
                scheduleVoiceSend();
            };
            rec.onerror = function(event) {
                console.error('Speech error:', event.error);
                if (event.error !== 'aborted') setListeningState(false);
            };
            rec.onend = function() {
                if (isListening && recognition === rec) {
                    setTimeout(() => {
                        if (isListening && recognition === rec) {
                            try { rec.start(); } catch(e) {}
                        }
                    }, 200);
                }
            };
            return rec;
        }

        function scheduleVoiceSend() {
            if (voiceSendTimer) clearTimeout(voiceSendTimer);
            voiceSendTimer = setTimeout(() => {
                const text = document.getElementById('userInput').value.trim();
                if (text) {
                    document.getElementById('userInput').value = '';
                    pauseVoiceInput();
                    sendMessage(text);
                }
            }, 2000);
        }

        function setListeningState(listening) {
            isListening = listening;
            const micBtn = document.getElementById('micBtn');
            const voiceHint = document.getElementById('voiceHint');
            if (listening) {
                micBtn.classList.add('listening', 'voice-active');
                voiceHint.classList.add('active');
            } else {
                micBtn.classList.remove('listening', 'voice-active');
                voiceHint.classList.remove('active');
            }
        }

        function stopVoiceInput() {
            if (voiceSendTimer) clearTimeout(voiceSendTimer);
            isListening = false;
            voiceMode = false;
            const oldRec = recognition;
            recognition = null;
            if (oldRec) {
                try { oldRec.stop(); } catch (e) {}
                try { oldRec.abort(); } catch (e) {}
            }
            setListeningState(false);
            stopVoice();
        }

        function startVoiceInput() {
            document.getElementById('userInput').value = '';
            voiceMode = true;
            // Unlock browser TTS on mobile (requires user gesture)
            if (window.speechSynthesis) {
                try {
                    const unlock = new SpeechSynthesisUtterance(' ');
                    unlock.volume = 0;
                    window.speechSynthesis.speak(unlock);
                } catch (e) {}
                if (window.speechSynthesis.getVoices().length === 0) {
                    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
                }
            }
            recognition = initRecognition();
            if (!recognition) return;
            recognition.lang = lastDetectedLang;
            try {
                recognition.start();
                isListening = true;
                setListeningState(true);
            } catch (e) {
                console.error('Recognition start error:', e);
            }
        }

        function getTTSVoice(lang) {
            if (!window.speechSynthesis) return null;
            const voices = window.speechSynthesis.getVoices();
            const preferred = recognitionLangs[lang] || 'en-US';
            return voices.find(v => v.lang === preferred)
                || voices.find(v => v.lang.startsWith(lang + '-'))
                || voices.find(v => v.lang.startsWith(preferred.split('-')[0]))
                || voices.find(v => v.lang.startsWith('en'))
                || voices[0];
        }

        function createTTSFallback(text, lang, onPlay, onEnd) {
            let playing = false;
            function makeUtterance() {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = recognitionLangs[lang] || 'en-US';
                const voice = getTTSVoice(lang);
                if (voice) utterance.voice = voice;
                utterance.onstart = () => { if (onPlay) onPlay(); };
                utterance.onend = () => { playing = false; if (onEnd) onEnd(); };
                utterance.onerror = () => { playing = false; if (onEnd) onEnd(); };
                return utterance;
            }
            return {
                play: () => {
                    playing = true;
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(makeUtterance());
                },
                pause: () => {
                    window.speechSynthesis.cancel();
                    playing = false;
                    if (onEnd) onEnd();
                },
                get paused() { return !playing; }
            };
        }

        function toggleVoiceInput() {
            if (isListening) {
                stopVoiceInput();
            } else {
                startVoiceInput();
            }
        }

        function createVoicePlayerHTML(id) {
            return `
                <div class="voice-player" id="voice-${id}">
                    <button class="voice-play-btn" id="play-${id}" onclick="playVoice('${id}')">
                        <span class="v-play">${playIcon}</span>
                        <span class="v-pause" style="display:none">${pauseIcon}</span>
                    </button>
                </div>
            `;
        }

        function updateVoiceUI(id, state) {
            const msg = document.getElementById(id);
            if (!msg) return;
            const btn = msg.querySelector('.voice-play-btn');
            const play = msg.querySelector('.v-play');
            const pause = msg.querySelector('.v-pause');
            if (!btn || !play || !pause) return;
            if (state === 'playing') {
                play.style.display = 'none';
                pause.style.display = 'block';
                btn.classList.add('playing');
                msg.classList.add('voice-active');
            } else {
                play.style.display = 'block';
                pause.style.display = 'none';
                btn.classList.remove('playing');
                msg.classList.remove('voice-active');
            }
        }

        function stopVoice() {
            if (currentAudio) {
                const id = currentAudioMsg;
                const audio = currentAudio;
                currentAudio = null;
                currentAudioMsg = null;
                audio.pause();
                updateVoiceUI(id, 'idle');
            }
        }

        function setVoiceLoading(id, loading) {
            const btn = document.getElementById(`play-${id}`);
            if (!btn) return;
            btn.classList.remove('playing');
            if (loading) {
                btn.innerHTML = `<div class="spinner" style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite"></div>`;
                btn.disabled = true;
            } else {
                btn.innerHTML = `<span class="v-play">${playIcon}</span><span class="v-pause" style="display:none">${pauseIcon}</span>`;
                btn.disabled = false;
            }
        }

        function playVoice(id) {
            const msg = document.getElementById(id);
            const text = stripEmojis(msg.querySelector('.bot-text').textContent);
            const lang = msg.dataset.lang || 'en';

            if (currentAudio && currentAudioMsg === id) {
                if (currentAudio.paused) {
                    currentAudio.play().catch(e => console.error('Play error:', e));
                } else {
                    currentAudio.pause();
                }
                return;
            }

            if (!text) {
                setVoiceLoading(id, false);
                return;
            }

            stopVoice();
            setVoiceLoading(id, true);

            fetch('/speak', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, language: lang })
            })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(err => { throw new Error(`Audio failed (${response.status}): ${err}`); });
                }
                return response.blob();
            })
            .then(blob => {
                const url = URL.createObjectURL(blob);
                currentAudio = new Audio(url);
                currentAudioMsg = id;
                currentAudio.onplay = () => {
                    updateVoiceUI(id, 'playing');
                    if (voiceMode) pauseVoiceInput();
                };
                currentAudio.onpause = () => updateVoiceUI(id, 'paused');
                currentAudio.onended = () => {
                    stopVoice();
                    if (voiceMode) resumeVoiceInput();
                };
                setVoiceLoading(id, false);
                updateVoiceUI(id, 'playing');
                currentAudio.play().catch(e => {
                    console.error('Play error:', e);
                    updateVoiceUI(id, 'idle');
                });
            })
            .catch(err => {
                console.error('Voice play error:', err && err.message ? err.message : err);
                setVoiceLoading(id, false);
                // Fallback to browser TTS
                if (window.speechSynthesis && window.speechSynthesis.speak) {
                    currentAudio = createTTSFallback(text, lang,
                        () => {
                            updateVoiceUI(id, 'playing');
                            if (voiceMode) pauseVoiceInput();
                        },
                        () => {
                            stopVoice();
                            if (voiceMode) resumeVoiceInput();
                        }
                    );
                    currentAudioMsg = id;
                    updateVoiceUI(id, 'playing');
                    currentAudio.play();
                } else {
                    alert('Voice failed. Please check your audio/speech settings or try a different browser.');
                }
            });
        }

        function pauseVoiceInput() {
            if (!isListening || !recognition) return;
            isListening = false;
            const oldRec = recognition;
            recognition = null;
            if (oldRec) {
                try { oldRec.stop(); } catch (e) {}
                try { oldRec.abort(); } catch (e) {}
            }
            setListeningState(false);
        }

        function resumeVoiceInput() {
            if (!voiceMode || isListening) return;
            document.getElementById('userInput').value = '';
            setTimeout(() => {
                if (!voiceMode || isListening) return;
                recognition = initRecognition();
                if (!recognition) return;
                recognition.lang = lastDetectedLang;
                try {
                    recognition.start();
                    isListening = true;
                    setListeningState(true);
                } catch (e) {
                    console.error('Resume voice input error:', e);
                }
            }, 300);
        }

        function addBotMessage(text, lang) {
            const messages = document.getElementById('messages');
            const id = 'msg-' + Date.now();
            const row = document.createElement('div');
            row.className = 'message-row bot-row';
            row.innerHTML = `
                <div class="avatar bot-avatar">🤖</div>
                <div class="message bot-message" id="${id}" data-lang="${lang || 'en'}">
                    <span class="bot-text">${text}</span>
                    ${createVoicePlayerHTML(id)}
                    ${messageActionsHTML}
                </div>
            `;
            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;
            if (voiceMode) {
                setTimeout(() => playVoice(id), 400);
            }
        }

        function addUserMessage(text) {
            const messages = document.getElementById('messages');
            const row = document.createElement('div');
            row.className = 'message-row user-row';
            row.innerHTML = `
                <div class="message user-message">${text}</div>
                <div class="avatar user-avatar">👤</div>
            `;
            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;
        }

        const userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        async function uploadDocument(input) {
            const file = input.files[0];
            if (!file) return;
            const messages = document.getElementById('messages');
            const infoDiv = document.createElement('div');
            infoDiv.className = 'message bot-message';
            infoDiv.style.background = '#f3f4f6';
            infoDiv.textContent = `Uploading ${file.name}...`;
            messages.appendChild(infoDiv);
            messages.scrollTop = messages.scrollHeight;
            try {
                const formData = new FormData();
                formData.append('file', file);
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                infoDiv.remove();
                if (!response.ok) {
                    addBotMessage('⚠️ Upload failed: ' + (data.error || 'Unknown error'), 'en');
                } else {
                    addBotMessage(`✅ Uploaded "${data.filename}" (${data.chunks} chunks). I can now answer questions from this document.`, 'en');
                }
            } catch (error) {
                infoDiv.remove();
                addBotMessage('⚠️ Upload failed. Please try again.', 'en');
            }
            input.value = '';
        }

        async function sendMessage(voiceText) {
            const input = document.getElementById('userInput');
            const messages = document.getElementById('messages');
            const typing = document.getElementById('typing');
            const userText = voiceText ? voiceText.trim() : input.value.trim();
            if (!userText) return;
            input.value = '';

            // If user typed (not voice), disable voice mode so replies stay text-only
            if (!voiceText) {
                stopVoiceInput();
                stopVoice();
            }

            addUserMessage(userText);
            const messagesToSend = conversationHistory.concat([{ role: 'user', content: userText }]);
            if (messagesToSend.length > 10) messagesToSend.shift();
            typing.style.display = 'block';
            messages.scrollTop = messages.scrollHeight;
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText, timezone: userTimezone, history: messagesToSend })
                });
                const data = await response.json();
                typing.style.display = 'none';
                if (!response.ok) {
                    const errMsg = data.error || `Server error (${response.status})`;
                    addBotMessage('⚠️ ' + errMsg, 'en');
                } else {
                    if (data.language) {
                        lastDetectedLang = recognitionLangs[data.language] || 'en-US';
                    }
                    addBotMessage(data.reply, data.language);
                    conversationHistory.push({ role: 'user', content: userText });
                    conversationHistory.push({ role: 'assistant', content: data.reply });
                    if (conversationHistory.length > 10) conversationHistory.shift();
                }
            } catch (error) {
                typing.style.display = 'none';
                addBotMessage('⚠️ Could not reach the server. Please try again.', 'en');
            }
        }

        // Add voice player to the welcome message
        const welcomeMsg = document.getElementById('welcomeMsg');
        if (welcomeMsg && !welcomeMsg.querySelector('.voice-player')) {
            welcomeMsg.dataset.lang = 'en';
            welcomeMsg.insertAdjacentHTML('beforeend', createVoicePlayerHTML('welcomeMsg'));
        }
    </script>
</body>
</html>
