<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — AI Chatbot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0a0a1a; color:#e2e8f0; min-height:100vh; }

        /* Login */
        #loginScreen {
            display:flex; align-items:center; justify-content:center;
            min-height:100vh; padding:20px;
        }
        .login-box {
            background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
            border-radius:20px; padding:40px; max-width:400px; width:100%;
            text-align:center; backdrop-filter:blur(10px);
        }
        .login-box h1 { font-size:1.8rem; font-weight:800; margin-bottom:8px;
            background:linear-gradient(135deg,#a78bfa,#60a5fa);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .login-box p { color:#64748b; margin-bottom:28px; }
        .login-box input {
            width:100%; padding:13px 16px; background:rgba(255,255,255,.07);
            border:1px solid rgba(255,255,255,.15); border-radius:10px;
            color:#fff; font-size:1rem; outline:none; margin-bottom:14px;
        }
        .login-box input:focus { border-color:#a78bfa; }
        .login-btn {
            width:100%; padding:14px; border:none; border-radius:10px; cursor:pointer;
            background:linear-gradient(135deg,#a78bfa,#60a5fa);
            color:#fff; font-weight:700; font-size:1rem;
        }
        .err { color:#f87171; font-size:.85rem; margin-top:10px; }

        /* Dashboard */
        #dashboard { display:none; }
        .topbar {
            background:rgba(255,255,255,.04); border-bottom:1px solid rgba(255,255,255,.08);
            padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
        }
        .topbar h1 { font-size:1.3rem; font-weight:700;
            background:linear-gradient(135deg,#a78bfa,#60a5fa);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .logout-btn {
            padding:8px 18px; border-radius:8px; border:1px solid rgba(255,255,255,.15);
            background:transparent; color:#94a3b8; cursor:pointer; font-size:.85rem;
        }

        .main { padding:28px; max-width:1200px; margin:0 auto; }

        /* Stats */
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:32px; }
        .stat-card {
            background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
            border-radius:14px; padding:20px;
        }
        .stat-card .label { font-size:.8rem; color:#64748b; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
        .stat-card .value { font-size:2rem; font-weight:800; color:#a78bfa; }

        /* Clients table */
        .section-title { font-size:1.1rem; font-weight:700; margin-bottom:16px; color:#e2e8f0; }
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        th {
            background:rgba(167,139,250,.1); color:#a78bfa; font-size:.78rem;
            text-transform:uppercase; letter-spacing:.5px; padding:12px 16px; text-align:left;
        }
        td { padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.05); color:#94a3b8; font-size:.9rem; }
        tr:hover td { background:rgba(255,255,255,.03); }
        .badge {
            display:inline-block; padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:600;
        }
        .badge-starter      { background:rgba(96,165,250,.15); color:#60a5fa; }
        .badge-professional { background:rgba(167,139,250,.15); color:#a78bfa; }
        .badge-enterprise   { background:rgba(52,211,153,.15);  color:#34d399; }
        .badge-done   { background:rgba(52,211,153,.15);  color:#34d399; }
        .badge-pending{ background:rgba(251,191,36,.15);  color:#fbbf24; }

        .deploy-btn {
            padding:6px 14px; border-radius:7px; border:none; cursor:pointer;
            background:linear-gradient(135deg,#a78bfa,#60a5fa); color:#fff;
            font-size:.8rem; font-weight:600;
        }
        .deploy-btn:disabled { opacity:.4; cursor:not-allowed; }

        /* Deploy Modal */
        #deployModal {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,.7);
            z-index:9999; align-items:center; justify-content:center;
        }
        #deployModal.show { display:flex; }
        .modal-box {
            background:#1a1a2e; border:1px solid rgba(255,255,255,.12);
            border-radius:18px; padding:32px; max-width:480px; width:90%;
        }
        .modal-box h2 { font-size:1.2rem; font-weight:700; margin-bottom:20px; color:#e2e8f0; }
        .modal-box label { display:block; color:#94a3b8; font-size:.82rem; font-weight:600;
            margin-bottom:6px; text-transform:uppercase; letter-spacing:.4px; }
        .modal-box input, .modal-box textarea {
            width:100%; padding:11px 14px; background:rgba(255,255,255,.07);
            border:1px solid rgba(255,255,255,.15); border-radius:9px;
            color:#fff; font-size:.95rem; outline:none; margin-bottom:16px;
        }
        .modal-box textarea { height:80px; resize:none; font-family:inherit; }
        .modal-row { display:flex; gap:10px; }
        .modal-row button { flex:1; padding:12px; border:none; border-radius:9px; cursor:pointer; font-weight:600; }
        .btn-confirm { background:linear-gradient(135deg,#a78bfa,#60a5fa); color:#fff; }
        .btn-cancel  { background:rgba(255,255,255,.08); color:#94a3b8; }

        .refresh-btn {
            padding:9px 18px; border-radius:8px; border:1px solid #a78bfa55;
            background:rgba(167,139,250,.1); color:#a78bfa; cursor:pointer;
            font-size:.85rem; font-weight:600; margin-bottom:20px;
        }
        .empty { text-align:center; padding:60px; color:#475569; }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
    <div class="login-box">
        <h1>🤖 Admin Panel</h1>
        <p>AI Chatbot Business Dashboard</p>
        <input type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter') login()">
        <button class="login-btn" onclick="login()">Login</button>
        <div class="err" id="loginErr"></div>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
    <div class="topbar">
        <h1>🤖 AI Chatbot — Business Panel</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="main">

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="label">Total Clients</div>
                <div class="value" id="statTotal">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Deployed</div>
                <div class="value" id="statDeployed">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Pending Deploy</div>
                <div class="value" id="statPending">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Revenue (AED)</div>
                <div class="value" id="statRevenue">0</div>
            </div>
        </div>

        <!-- Clients Table -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div class="section-title">All Clients</div>
            <button class="refresh-btn" onclick="loadClients()">🔄 Refresh</button>
        </div>

        <div class="table-wrap">
            <table id="clientsTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Website URL</th>
                        <th>Plan</th>
                        <th>Access Code</th>
                        <th>Paid At</th>
                        <th>Status</th>
                        <th>Embed Code</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="clientsBody">
                    <tr><td colspan="9" class="empty">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Deploy Modal -->
<div id="deployModal">
    <div class="modal-box">
        <h2>✅ Mark as Deployed</h2>
        <label>Client Website URL</label>
        <input type="url" id="deployUrl" placeholder="https://clientwebsite.ae">
        <label>Notes (optional)</label>
        <textarea id="deployNotes" placeholder="Deployed chatbot widget on homepage..."></textarea>
        <div class="modal-row">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" onclick="confirmDeploy()">Mark Deployed ✓</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_PW = 'farman2024';
    let pw = '';
    let currentCode = '';
    const PRICES = { starter: 499, professional: 1499, enterprise: 3499 };

    function login() {
        pw = document.getElementById('pwInput').value;
        fetch('/admin/clients?pw=' + pw)
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('loginErr').textContent = '❌ Wrong password';
                } else {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    renderClients(data.clients);
                }
            })
            .catch(() => {
                document.getElementById('loginErr').textContent = '❌ Server error';
            });
    }

    function logout() {
        pw = '';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('pwInput').value = '';
    }

    function loadClients() {
        fetch('/admin/clients?pw=' + pw)
            .then(r => r.json())
            .then(data => { if (data.clients) renderClients(data.clients); });
    }

    function renderClients(clients) {
        const tbody = document.getElementById('clientsBody');

        if (!clients.length) {
            tbody.innerHTML = '<tr><td colspan="9" class="empty">No clients yet. Share your payment link!</td></tr>';
            updateStats(clients);
            return;
        }

        tbody.innerHTML = clients.map((c, i) => `
            <tr>
                <td>${i + 1}</td>
                <td style="color:#e2e8f0;font-weight:500;">${c.name || '—'}</td>
                <td>${c.email || '—'}</td>
                <td>
                    ${c.website
                        ? `<a href="${c.website}" target="_blank" style="color:#60a5fa;text-decoration:none;">${c.website}</a>`
                        : '<span style="color:#475569;">—</span>'}
                </td>
                <td><span class="badge badge-${c.plan}">${c.plan || '—'}</span></td>
                <td style="font-family:monospace;font-size:.82rem;color:#a78bfa;">${c.access_code || '—'}</td>
                <td>${c.paid_at ? c.paid_at.substring(0,16).replace('T',' ') : '—'}</td>
                <td><span class="badge badge-${c.deployed ? 'done' : 'pending'}">${c.deployed ? '✅ Deployed' : '⏳ Pending'}</span></td>
                <td>
                    <button class="deploy-btn" style="background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid #60a5fa44;" onclick="copyEmbed('${c.access_code}')">
                        📋 Copy
                    </button>
                </td>
                <td>
                    <button class="deploy-btn" onclick="openDeploy('${c.access_code}','${c.website || ''}')"
                        ${c.deployed ? 'disabled' : ''}>
                        ${c.deployed ? 'Done' : 'Deploy Bot'}
                    </button>
                </td>
            </tr>
        `).join('');

        updateStats(clients);
    }

    function updateStats(clients) {
        const deployed = clients.filter(c => c.deployed).length;
        const revenue  = clients.reduce((sum, c) => sum + (PRICES[c.plan] || 0), 0);
        document.getElementById('statTotal').textContent    = clients.length;
        document.getElementById('statDeployed').textContent = deployed;
        document.getElementById('statPending').textContent  = clients.length - deployed;
        document.getElementById('statRevenue').textContent  = revenue.toLocaleString();
    }

    function openDeploy(code, website) {
        currentCode = code;
        document.getElementById('deployUrl').value    = website || '';
        document.getElementById('deployNotes').value  = '';
        document.getElementById('deployModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('deployModal').classList.remove('show');
        currentCode = '';
    }

    function copyEmbed(accessCode) {
        const code = `<script src="https://ai-chatbot-production-2f3a.up.railway.app/widget.js" data-agent="AI Assistant" data-welcome="Hello! How can I help you?" data-access="${accessCode}"><\/script>`;
        navigator.clipboard.writeText(code).then(() => alert('✅ Embed code copied!\n\nSend this to your client — they paste it before </body> in their website HTML.'));
    }

    function confirmDeploy() {
        const url   = document.getElementById('deployUrl').value.trim();
        const notes = document.getElementById('deployNotes').value.trim();
        fetch('/admin/deploy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pw, access_code: currentCode, website_url: url, notes })
        })
        .then(r => r.json())
        .then(() => { closeModal(); loadClients(); });
    }

    // Auto-refresh every 30 seconds
    setInterval(() => { if (pw) loadClients(); }, 30000);
</script>
</body>
</html>
