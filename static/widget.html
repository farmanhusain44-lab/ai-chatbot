<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Header */
#chat-header{padding:14px 16px;background:var(--color,#6366f1);color:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0}
#chat-header .av{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
#chat-header .info h4{font-size:.9rem;font-weight:700;margin-bottom:2px}
#chat-header .info p{font-size:.72rem;opacity:.85}
#close-btn{margin-left:auto;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;opacity:.8;padding:4px}
#close-btn:hover{opacity:1}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#f8fafc}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:.85rem;line-height:1.55;word-break:break-word}
.msg.bot{background:#fff;color:#1e293b;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);align-self:flex-start}
.msg.user{background:var(--color,#6366f1);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.typing{display:flex;gap:5px;align-items:center;padding:10px 14px;background:#fff;border-radius:16px;border-bottom-left-radius:4px;align-self:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.typing span{width:7px;height:7px;background:#94a3b8;border-radius:50%;animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* Input */
#input-area{padding:10px 12px;border-top:1px solid #e2e8f0;display:flex;gap:8px;background:#fff;flex-shrink:0}
#user-input{flex:1;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:24px;font-size:.88rem;outline:none;transition:.2s;font-family:inherit;resize:none}
#user-input:focus{border-color:var(--color,#6366f1)}
#send-btn{width:40px;height:40px;border-radius:50%;background:var(--color,#6366f1);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
#send-btn:hover{opacity:.85}
#send-btn svg{width:18px;height:18px}

/* Powered by */
#powered{text-align:center;padding:5px;font-size:.65rem;color:#94a3b8;background:#fff;flex-shrink:0}
</style>
</head>
<body>

<div id="chat-header">
  <div class="av" style="background:none;padding:0"><img src="https://i.imgur.com/FfNwGyA.png" width="36" height="36" style="border-radius:50%;object-fit:cover"/></div>
  <div class="info">
    <h4 id="agent-name">AI Assistant</h4>
    <p>● Online — replies instantly</p>
  </div>
  <button id="close-btn" onclick="closeWidget()">✕</button>
</div>

<div id="messages"></div>

<div id="input-area">
  <input id="user-input" type="text" placeholder="Type a message..." autocomplete="off">
  <button id="send-btn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<div id="powered"><img src="https://i.imgur.com/FfNwGyA.png" width="13" height="13" style="border-radius:50%;vertical-align:middle;margin-right:4px"/>Powered by BotifyAI</div>

<script>
const params = new URLSearchParams(window.location.search);
const agentName = params.get('name') || 'AI Assistant';
const color = params.get('color') || '#6366f1';
const lang = (params.get('lang') || 'en').toLowerCase();

document.getElementById('agent-name').textContent = agentName;
document.documentElement.style.setProperty('--color', color);

const WELCOME_BY_LANG = {
    en: 'Hello! 👋 Welcome to ' + agentName + '. How can I help you today?',
    hi: 'नमस्ते! 👋 ' + agentName + ' में आपका स्वागत है। मैं आपकी कैसे मदद कर सकता हूँ?',
    bn: 'হ্যালো! 👋 ' + agentName + ' এ স্বাগতম। আমি আপনাকে কীভাবে সাহায্য করতে পারি?',
    ne: 'नमस्कार! 👋 ' + agentName + ' मा स्वागत छ। म तपाईंलाई कसरी सहयोग गर्न सक्छु?',
    si: 'ආයුබෝවන්! 👋 ' + agentName + ' වෙත සාදරයෙන් පිළිගනිමු. මට ඔබට කෙසේ උදව් කළ හැකිද?',
    ta: 'வணக்கம்! 👋 ' + agentName + ' க்கு வரவேற்கிறோம். நான் எப்படி உதவ முடியும்?',
    ar: 'مرحباً! 👋 أهلاً بك في ' + agentName + '. كيف يمكنني مساعدتك اليوم؟',
    ur: 'ہیلو! 👋 ' + agentName + ' میں خوش آمدید۔ آج میں آپ کی کیا مدد کر سکتا ہوں؟',
    'zh-cn': '你好！👋 欢迎来到 ' + agentName + '。我今天能怎么帮您？',
    zh: '你好！👋 欢迎来到 ' + agentName + '。我今天能怎么帮您？',
    my: 'မင်္ဂလာပါ! 👋 ' + agentName + ' မှ ကြိုဆိုပါတယ်။ ဒီနေ့ ဘယ်လိုကူညီပေးရမလဲ?',
    id: 'Halo! 👋 Selamat datang di ' + agentName + '. Ada yang bisa saya bantu hari ini?',
    dz: 'བཀྲ་ཤིས་བདེ་ལེགས། 👋 ' + agentName + ' ལ་བྱོན་པར་དགའ་བསུ་ཞུ། ག་རེ་བྱས་ནས་རོགས་པ་ཞུ་དགོས་སམ?'
};
const welcomeText = WELCOME_BY_LANG[lang] || WELCOME_BY_LANG.en;

const REPLIES = {
    'hello':     'Hello! 👋 I am BotifyAI Assistant. I help businesses automate customer support, answer FAQs, and capture leads 24/7. How can I help?',
    'hi':        'Hi there! 👋 BotifyAI works on websites and WhatsApp, supports multilingual customers, and can be trained on your business information.',
    'price':     'For UAE businesses, Starter is AED 499/month, Professional AED 1,499/month, and Enterprise AED 3,499/month. All plans include free installation support. 💼',
    'pricing':   'For UAE businesses, Starter is AED 499/month, Professional AED 1,499/month, and Enterprise AED 3,499/month. All plans include free installation support. 💼',
    'service':   'BotifyAI provides AI chatbots for websites and WhatsApp. The bot answers FAQs, shares products and prices, captures leads, and supports customers 24/7 in Arabic and English. 🚀',
    'feature':   'Key features include multilingual replies, custom training on your PDFs and FAQs, lead capture, analytics, WhatsApp integration, and support for WordPress, Shopify, Wix, Webflow, and custom websites.',
    'train':     'Yes. On Professional and Enterprise plans, you can train the bot on your products, services, prices, FAQs, and policies so it gives business-specific answers.',
    'install':   'Setup usually takes about 5 minutes. Add one line of code to your website, or contact us on WhatsApp and our team can install it for you free. 📱',
    'arabic':    'Yes! BotifyAI automatically detects Arabic or English and replies in the same language. 🌍',
    'language':  'BotifyAI supports Arabic and English for UAE businesses, with multilingual support available for other markets.',
    'whatsapp':  'The Professional plan includes WhatsApp bot integration. The bot can answer questions, share information, and capture leads from WhatsApp.',
    'analytics': 'The dashboard can show conversations, common questions, and captured leads so you can understand your customers and improve your business.',
    'wordpress': 'On WordPress, add the BotifyAI code using a header/footer plugin or your theme footer. Our team can help with installation.',
    'shopify':   'On Shopify, add the BotifyAI code through Online Store → Themes → Edit Code → theme.liquid, before </body>. Our team can help.',
    'trial':     'All plans include a 7-day money-back guarantee. Please check the current pricing page for the latest plan terms.',
    'help':      'I can help with features, pricing, setup, languages, WhatsApp, training, and website compatibility. You can also contact us on WhatsApp for installation help.',
    'start':     'Click Get Started, choose a plan, enter your details, and complete payment. You will receive setup instructions, and our team can help install the bot. 🚀',
    'مرحبا':     'مرحباً! 👋 أنا مساعد BotifyAI. كيف يمكنني مساعدتك في خدمة العملاء أو إعداد روبوتك؟',
    'مرحباً':    'مرحباً! 👋 أنا مساعد BotifyAI. كيف يمكنني مساعدتك في خدمة العملاء أو إعداد روبوتك؟',
    'السعر':     'تبدأ خطط الإمارات من 499 درهماً شهرياً. تشمل جميع الخطط دعم التثبيت المجاني. 💼',
    'default':   'BotifyAI helps businesses answer customer questions 24/7, train an AI bot on business information, capture leads, and support customers through websites and WhatsApp. Ask me about pricing, setup, languages, training, or features. 😊'
};

function getReply(text) {
    const t = text.toLowerCase();
    for (const [key, val] of Object.entries(REPLIES)) {
        if (t.includes(key)) return val;
    }
    return REPLIES.default;
}

function addMsg(text, type) {
    const msgs = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'msg ' + type;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
    const msgs = document.getElementById('messages');
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
}

const accessCode = params.get('access') || '';
let chatHistory = [];

async function sendMsg() {
    const inp = document.getElementById('user-input');
    const txt = inp.value.trim();
    if (!txt) return;
    inp.value = '';
    addMsg(txt, 'user');
    showTyping();

    chatHistory.push({ role: 'user', content: txt });

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: txt,
                access_code: accessCode,
                history: chatHistory.slice(-10)
            })
        });
        removeTyping();
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            addMsg(err.error || 'Sorry, something went wrong. Please try again.', 'bot');
            return;
        }
        const data = await res.json();
        addMsg(data.reply || getReply(txt), 'bot');
        chatHistory.push({ role: 'assistant', content: data.reply });
    } catch (e) {
        removeTyping();
        addMsg(getReply(txt), 'bot');
    }
}

document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
    }
});

function closeWidget() {
    window.parent.postMessage({ action: 'close-widget' }, '*');
}

// Welcome message
setTimeout(() => {
    addMsg(welcomeText, 'bot');
}, 400);
</script>
</body>
</html>
