<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Header */
#chat-header{padding:14px 16px;background:var(--color,#6366f1);color:#fff;display:flex;align-items:center;gap:10px;flex-shrink:0}
#chat-header .av{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
#chat-header .info h4{font-size:.9rem;font-weight:700;margin-bottom:2px}
#chat-header .info p{font-size:.72rem;opacity:.85}
#close-btn{margin-left:auto;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;opacity:.8;padding:4px}
#close-btn:hover{opacity:1}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#f8fafc}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:.85rem;line-height:1.55;word-break:break-word}
.msg.bot{background:#fff;color:#1e293b;border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);align-self:flex-start}
.msg.user{background:var(--color,#6366f1);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.typing{display:flex;gap:5px;align-items:center;padding:10px 14px;background:#fff;border-radius:16px;border-bottom-left-radius:4px;align-self:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.typing span{width:7px;height:7px;background:#94a3b8;border-radius:50%;animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* Input */
#input-area{padding:10px 12px;border-top:1px solid #e2e8f0;display:flex;gap:8px;background:#fff;flex-shrink:0}
#user-input{flex:1;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:24px;font-size:.88rem;outline:none;transition:.2s;font-family:inherit;resize:none}
#user-input:focus{border-color:var(--color,#6366f1)}
#send-btn{width:40px;height:40px;border-radius:50%;background:var(--color,#6366f1);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
#send-btn:hover{opacity:.85}
#send-btn svg{width:18px;height:18px}

/* Powered by */
#powered{text-align:center;padding:5px;font-size:.65rem;color:#94a3b8;background:#fff;flex-shrink:0}
</style>
</head>
<body>

<div id="chat-header">
  <div class="av" style="background:none;padding:0"><img src="https://i.imgur.com/FfNwGyA.png" width="36" height="36" style="border-radius:50%;object-fit:cover"/></div>
  <div class="info">
    <h4 id="agent-name">AI Assistant</h4>
    <p>● Online — replies instantly</p>
  </div>
  <button id="close-btn" onclick="closeWidget()">✕</button>
</div>

<div id="messages"></div>

<div id="input-area">
  <input id="user-input" type="text" placeholder="Type a message..." autocomplete="off">
  <button id="send-btn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<div id="powered"><img src="https://i.imgur.com/FfNwGyA.png" width="13" height="13" style="border-radius:50%;vertical-align:middle;margin-right:4px"/>Powered by BotifyAI</div>

<script>
const params = new URLSearchParams(window.location.search);
const agentName = params.get('name') || 'AI Assistant';
const color = params.get('color') || '#6366f1';

document.getElementById('agent-name').textContent = agentName;
document.documentElement.style.setProperty('--color', color);

const REPLIES = {
    'hello':     'Hello! 👋 How can I help you today?',
    'hi':        'Hi there! 👋 How can I assist you?',
    'price':     'Our plans start from AED 499/month for Starter, AED 1,499 for Professional, and AED 3,499 for Enterprise. All include free setup! 💼',
    'pricing':   'Our plans start from AED 499/month for Starter, AED 1,499 for Professional, and AED 3,499 for Enterprise. All include free setup! 💼',
    'service':   'We offer AI chatbots for websites that reply in Arabic & English 24/7. Setup takes just 5 minutes! 🚀',
    'install':   'Easy! After payment, we send a step-by-step guide by email. Or WhatsApp us — we install it for free! 📱',
    'arabic':    'Yes! The bot automatically detects Arabic or English and replies in the same language. No setup needed! 🌍',
    'wordpress': 'On WordPress: Install "Insert Headers and Footers" plugin → paste your code in footer. Done in 2 minutes! ✅',
    'shopify':   'On Shopify: Online Store → Themes → Edit Code → theme.liquid → paste before </body>. Done! ✅',
    'help':      'Happy to help! Contact us on WhatsApp or visit our website for more info. We respond within minutes! ⚡',
    'start':     'Great! Click "Get Started" on our website, pick a plan, fill your details, and pay. Your bot is live in 5 minutes! 🚀',
    'مرحبا':     'مرحباً! 👋 كيف يمكنني مساعدتك اليوم؟',
    'مرحباً':    'مرحباً! 👋 كيف يمكنني مساعدتك اليوم؟',
    'السعر':     'تبدأ خططنا من 499 درهم شهرياً. جميع الخطط تشمل الإعداد المجاني! 💼',
    'default':   'Thank you for your message! For more details, please visit our website or contact us on WhatsApp. We\'re happy to help! 😊'
};

function getReply(text) {
    const t = text.toLowerCase();
    for (const [key, val] of Object.entries(REPLIES)) {
        if (t.includes(key)) return val;
    }
    return REPLIES.default;
}

function addMsg(text, type) {
    const msgs = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'msg ' + type;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
    const msgs = document.getElementById('messages');
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
}

function sendMsg() {
    const inp = document.getElementById('user-input');
    const txt = inp.value.trim();
    if (!txt) return;
    inp.value = '';
    addMsg(txt, 'user');
    showTyping();
    setTimeout(() => {
        removeTyping();
        addMsg(getReply(txt), 'bot');
    }, 1000 + Math.random() * 500);
}

document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
    }
});

function closeWidget() {
    window.parent.postMessage({ action: 'close-widget' }, '*');
}

// Welcome message
setTimeout(() => {
    addMsg('Hello! 👋 Welcome to ' + agentName + '. How can I help you today?', 'bot');
}, 400);
</script>
</body>
</html>
